<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ansible, Terraform, Linux</title>
  <style>
    :root {
      --bg1: #061a2f;
      --bg2: #0b2744;
      --panel: rgba(10, 33, 58, 0.88);
      --accent: #1ea7ff;
      --accent-soft: #6cc8ff;
      --text: #eaf6ff;
      --muted: #b8d6ea;
      --border: rgba(108, 200, 255, 0.28);
      --shadow: rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(30, 167, 255, 0.18), transparent 35%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    .container {
      width: min(100%, 1000px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px;
      text-align: center;
      box-shadow: 0 18px 45px var(--shadow);
      backdrop-filter: blur(6px);
    }

    h1 {
      margin: 0 0 24px;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1.2;
      color: var(--accent-soft);
      text-shadow: 0 0 12px rgba(30, 167, 255, 0.22);
      letter-spacing: 0.5px;
    }

    .image-frame {
      padding: 18px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 0 20px rgba(30, 167, 255, 0.08);
    }

    img {
      width: 100%;
      max-width: 850px;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 12px;
    }

    p {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>This page was created with Ansible, Terraform, Linux</h1>
    <div class="image-frame">
      <img src="logos.png" alt="Tux, Ansible logo, and Terraform logo" width="500" height="400" /> 
    </div>
    <p>Simple HTML page brought to life with DevOps</p>
  </main>
</body>
</html>
