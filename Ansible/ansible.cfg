[defaults]
inventory = ./inventory/aws_ec2.yaml # Added this so Ansible point to file automatilly wont need to type when running playbook
host_key_checking = False
private_key_file = ~/.ssh/id_ed25519.pub # Copy SSH key for bone user to have permisson to run plays
remote_user = ubuntu

[inventory]
enable_plugins = host_list, script, auto, yaml, ini, toml, amazon.aws.aws_ec2
